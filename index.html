        body { font-family:'Inter',sans-serif; padding:30px; color:#1a1a2e; }
        @media print { @page { margin:0.4in; size:landscape; } body { padding:0; } .no-print { display:none !important; } }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #0f3460; padding-bottom:10px; margin-bottom:16px; }
        .header h1 { font-size:18px; color:#0f3460; }
        .header .meta { font-size:10px; color:#666; text-align:right; }
        .plan-img { width:100%; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; }
      </style></head><body>
      <div class="no-print" style="margin-bottom:16px;">
        <button onclick="window.print()" style="padding:10px 24px;background:#27ae60;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Print / Save PDF</button>
      </div>
      <div class="header">
        <h1>Takeoff Report</h1>
        <div class="meta">${fileName || ""}<br/>${new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}<br/>Scale: 1 ft = ${pxPerFt.toFixed(1)} px</div>
      </div>
      <img src="${imgData}" class="plan-img" />
      ${tableHTML}
    </body></html>`);
    win.document.close();
  };

  return (
    <div className="takeoff-container">
      <div className="takeoff-sidebar">
        <div className="card" style={{ padding: 14 }}><div className="card-title" style={{ marginBottom: 10 }}><span>PDF Upload</span></div>
          <input type="file" accept=".pdf" style={{ fontSize: 12 }} onChange={e => e.target.files[0] && loadPdf(e.target.files[0])} />
          {fileName && <div style={{ fontSize: 11, color: "#666", marginTop: 6 }}>{fileName} <span className="file-badge">loaded</span></div>}
          {totalPages > 1 && <div style={{ display: "flex", gap: 6, marginTop: 8, alignItems: "center" }}><button className="btn-sm" onClick={() => set({ pageNum: Math.max(1, pageNum-1) })}>Prev</button><span style={{ fontSize: 11 }}>Page {pageNum}/{totalPages}</span><button className="btn-sm" onClick={() => set({ pageNum: Math.min(totalPages, pageNum+1) })}>Next</button></div>}
        </div>
        <div className="card" style={{ padding: 14 }}><div className="card-title" style={{ marginBottom: 10 }}><span>Set Scale</span></div>
          {!scaleSet ? (<div><div className="scale-setup"><strong>Step 1:</strong> Click "Draw Scale Line" then click two points on a known dimension.<br/><strong>Step 2:</strong> Enter the real-world distance and click Set.</div>
            <div style={{ marginTop: 10, display: "flex", gap: 6, flexDirection: "column" }}>
              <button className="btn-add" onClick={() => set({ drawingScale: true, scalePoints: [] })} style={drawingScale ? { background: "#f1c40f", color: "#333", borderColor: "#d4a", borderStyle: "solid" } : {}}>{drawingScale ? (scalePoints.length === 0 ? "Click 1st point..." : "Click 2nd point...") : "Draw Scale Line"}</button>
              {scalePx > 0 && <div style={{ display: "flex", gap: 6, alignItems: "center" }}><div className="field" style={{ flex: 1 }}><label>Real distance (ft)</label><input type="number" min="0" step="0.1" value={scaleRealFt} onChange={e => set({ scaleRealFt: e.target.value })} placeholder="e.g. 10" /></div><button className="btn-primary" style={{ marginTop: 14, padding: "8px 14px", fontSize: 12 }} onClick={confirmScale}>Set</button></div>}
            </div></div>) : (<div style={{ fontSize: 11 }}><span style={{ color: "#27ae60", fontWeight: 700 }}>&#10003; Scale set</span> &mdash; 1 ft = {pxPerFt.toFixed(1)} px <button className="btn-sm" style={{ marginLeft: 8 }} onClick={() => set({ scaleSet: false, pxPerFt: 0, scalePoints: [], scalePx: 0, scaleRealFt: "" })}>Reset</button></div>)}
        </div>
        <div className="card" style={{ padding: 14 }}><div className="card-title" style={{ marginBottom: 10 }}><span>Measure</span></div>
          <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
            <button onClick={() => set({ measureMode: "length", currentPoints: [] })}
              style={{ flex: 1, padding: "8px 10px", borderRadius: 6, border: measureMode === "length" ? "2px solid #0f3460" : "1px solid #ddd",
                background: measureMode === "length" ? "#e8f0ff" : "#f8f9fa", color: measureMode === "length" ? "#0f3460" : "#888",
                fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
              &#9473; Length
            </button>
            <button onClick={() => set({ measureMode: "area", currentPoints: [] })}
              style={{ flex: 1, padding: "8px 10px", borderRadius: 6, border: measureMode === "area" ? "2px solid #0f3460" : "1px solid #ddd",
                background: measureMode === "area" ? "#e8f0ff" : "#f8f9fa", color: measureMode === "area" ? "#0f3460" : "#888",
                fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
              &#11034; Area
            </button>
          </div>
          <div className="field" style={{ marginBottom: 8 }}><label>Label</label><input value={activeLabel} onChange={e => set({ activeLabel: e.target.value })} placeholder={measureMode === "area" ? "e.g. Living Room" : "e.g. North Wall"} style={{ fontSize: 12 }} /></div>
          <div style={{ marginBottom: 8 }}><label style={{ fontSize: 10, fontWeight: 600, color: "#666", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 4, display: "block" }}>Color</label><div className="color-picker-row">{TAKEOFF_COLORS.map(c => <div key={c} className={`color-swatch ${activeColor === c ? "selected" : ""}`} style={{ background: c }} onClick={() => set({ activeColor: c })} />)}</div></div>
          <div style={{ display: "flex", gap: 6 }}>
            <button className="btn-add" style={{ flex: 1, fontSize: 11, padding: "6px 10px" }} onClick={finishMeasurement} disabled={currentPoints.length < minFinishPts}>
              {measureMode === "area" ? `Close Area (${currentPoints.length} pts)` : `Finish Line (${currentPoints.length} pts)`}
            </button>
            <button className="btn-sm" onClick={() => set({ currentPoints: currentPoints.slice(0, -1) })} disabled={currentPoints.length === 0}>Undo</button>
          </div>
          {measureMode === "area" && currentPoints.length > 0 && currentPoints.length < 3 && <div style={{ fontSize: 10, color: "#888", marginTop: 4 }}>Click at least 3 points to define an area.</div>}
          {!scaleSet && pdfBase64 && <div style={{ fontSize: 10, color: "#c0392b", marginTop: 6 }}>Set scale before measuring.</div>}
        </div>
        <div className="card" style={{ padding: 14, flex: 1, overflow: "auto" }}><div className="card-title" style={{ marginBottom: 8 }}>
            <span>Measurements</span>
            <div style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0, fontSize: 10, color: "#27ae60", textAlign: "right" }}>
              {totalFt > 0 && <div>{totalFt.toFixed(2)} ft</div>}
              {totalSqFt > 0 && <div>{totalSqFt.toFixed(1)} sq ft</div>}
            </div>
          </div>
          {measurements.length === 0 ? <div style={{ fontSize: 11, color: "#aaa", textAlign: "center", padding: 16 }}>No measurements yet</div> : measurements.map(m => (
            <div className="measurement-row" key={m.id}>
              <div className="m-color" style={{ background: m.color, borderRadius: m.type === "area" ? 2 : 10 }}></div>
              <span className="m-label">{m.label}</span>
              <span className="m-value" style={{ textAlign: "right" }}>
                {m.type === "area" ? (<>{m.areaSqFt.toFixed(1)} sf<br/><span style={{ fontSize: 9, color: "#888", fontWeight: 500 }}>{m.perimFt.toFixed(1)} lf</span></>) : (m.lengthFt.toFixed(2) + " ft")}
              </span>
              <button className="m-del" onClick={() => set({ measurements: measurements.filter(x => x.id !== m.id) })}>×</button>
            </div>
          ))}
        </div>
      </div>
      <div className="takeoff-canvas-wrap">
        <div className="takeoff-toolbar"><span style={{ fontWeight: 600, color: "white", fontSize: 12 }}>Takeoff Viewer</span><div className="separator"></div>
          {measurements.length > 0 && <button onClick={exportTakeoffPDF} style={{ background: "#27ae60", borderColor: "#27ae60", color: "white" }}>&#128424; Print Takeoff</button>}
          <div className="zoom-controls"><span>Zoom:</span><button onClick={() => set({ zoom: Math.max(0.3, +(zoom-0.2).toFixed(1)) })}>−</button><span style={{ color: "white", fontWeight: 600, minWidth: 38, textAlign: "center" }}>{Math.round(zoom*100)}%</span><button onClick={() => set({ zoom: Math.min(4, +(zoom+0.2).toFixed(1)) })}>+</button><button onClick={() => set({ zoom: 1 })}>Fit</button></div>
        </div>
        <div className="takeoff-canvas-area" style={{ cursor: (drawingScale || pxPerFt > 0) ? "crosshair" : "default" }}>
          {!pdfBase64 ? <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", flexDirection: "column", gap: 12, color: "#aaa", padding: 40, minHeight: 400 }}><div style={{ fontSize: 40 }}>&#128209;</div><div style={{ fontSize: 14, fontWeight: 600 }}>Upload a PDF to get started</div><div style={{ fontSize: 11 }}>Supports floor plans, site plans, and architectural drawings</div></div> : (
            <div style={{ position: "relative", display: "inline-block" }}><canvas ref={canvasRef} style={{ display: "block" }} /><canvas ref={overlayRef} style={{ position: "absolute", top: 0, left: 0, cursor: (drawingScale || pxPerFt > 0) ? "crosshair" : "default" }} onClick={handleCanvasClick} /></div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Main App ─────────────────────────────────────────────────── */
function App() {
  const [activeTab, setActiveTab] = useState("estimator");
  const [showExportMenu, setShowExportMenu] = useState(false);
  const [settings, setSettings] = useState({ companyName: "", companyAddress: "", companyPhone: "", companyEmail: "", markup: 60, tax: 10, aiContext: "" });
  const [project, setProject] = useState({ estimateNum: "EST-001", date: new Date().toISOString().slice(0, 10), clientName: "", projectName: "", location: "" });

  // Multiple estimates support
  const newEstimate = (name) => ({
    id: uid(), name: name || "Primary Estimate",
    lines: [ newLineItem() ],
    qualifications: deepCopy(DEFAULT_QUALS),
    exclusions: deepCopy(DEFAULT_EXCL),
    closingNote: "Thank you for the opportunity. Any questions, please feel free to contact us.",
  });
  const [estimates, setEstimates] = useState([ newEstimate("Primary Estimate") ]);
  const [activeEstIdx, setActiveEstIdx] = useState(0);

  // Derive active estimate data (proxies so existing code works unchanged)
  const activeEst = estimates[activeEstIdx] || estimates[0];
  const lines = activeEst.lines;
  const qualifications = activeEst.qualifications;
  const exclusions = activeEst.exclusions;
  const closingNote = activeEst.closingNote;

  // Proxy setters that update active estimate within array
  const setLines = (fn) => setEstimates(prev => prev.map((est, i) => i === activeEstIdx ? { ...est, lines: typeof fn === "function" ? fn(est.lines) : fn } : est));
  const setQualifications = (fn) => setEstimates(prev => prev.map((est, i) => i === activeEstIdx ? { ...est, qualifications: typeof fn === "function" ? fn(est.qualifications) : fn } : est));
  const setExclusions = (fn) => setEstimates(prev => prev.map((est, i) => i === activeEstIdx ? { ...est, exclusions: typeof fn === "function" ? fn(est.exclusions) : fn } : est));
  const setClosingNote = (val) => setEstimates(prev => prev.map((est, i) => i === activeEstIdx ? { ...est, closingNote: typeof val === "function" ? val(est.closingNote) : val } : est));

  const addEstimate = () => {
    const name = "Alternate " + estimates.length;
    setEstimates(prev => [...prev, newEstimate(name)]);
    setActiveEstIdx(estimates.length);
  };
  const duplicateEstimate = () => {
    const copy = deepCopy(activeEst);
    copy.id = uid();
    copy.name = activeEst.name + " (Copy)";
    setEstimates(prev => [...prev, copy]);
    setActiveEstIdx(estimates.length);
  };
  const removeEstimate = (idx) => {
    if (estimates.length <= 1) return;
    if (!confirm("Delete \"" + estimates[idx].name + "\"?")) return;
    setEstimates(prev => prev.filter((_, i) => i !== idx));
    setActiveEstIdx(prev => prev >= idx ? Math.max(0, prev - 1) : prev);
  };
  const renameEstimate = (idx, name) => setEstimates(prev => prev.map((est, i) => i === idx ? { ...est, name } : est));

  const [showSettings, setShowSettings] = useState(true);
  const [showQualExcl, setShowQualExcl] = useState(false);
  const [showProposal, setShowProposal] = useState(false);
  const [showGrouped, setShowGrouped] = useState(false);
  const printRef = useRef(null);
  const [takeoff, setTakeoff] = useState({ pdfBase64: null, fileName: "", pageNum: 1, totalPages: 0, zoom: 1.0, scaleSet: false, scaleRealFt: "", scalePx: 0, pxPerFt: 0, measurements: [], currentPoints: [], activeColor: TAKEOFF_COLORS[0], activeLabel: "", drawingScale: false, scalePoints: [], measureMode: "length" });

  // Media galleries
  const [proposals, setProposals] = useState([]);
  const [receipts, setReceipts] = useState([]);
  const [sitePhotos, setSitePhotos] = useState([]);
  const [subBids, setSubBids] = useState([]);
  const [changeOrders, setChangeOrders] = useState([]);
  const [signatureImg, setSignatureImg] = useState(null);

  // ── Cloud / Auth state ──
  const [fbUser, setFbUser] = useState(null);
  const [authResolved, setAuthResolved] = useState(false);
  const [cloudId, setCloudId] = useState(null);
  const [cloudLoading, setCloudLoading] = useState(false);
  const [cloudSaving, setCloudSaving] = useState(false);
  const [cloudItems, setCloudItems] = useState([]);
  const [cloudListLoading, setCloudListLoading] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };

  // ── AI state ──
  const [aiPanelOpen, setAiPanelOpen] = useState(false);
  const [aiInput, setAiInput] = useState("");
  const [aiParsed, setAiParsed] = useState([]);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);

  // Anonymous auth — sign in silently on mount, no login UI needed
  useEffect(() => {
    if (!fbAuth) { setAuthResolved(true); return; }
    const unsub = fbAuth.onAuthStateChanged(u => {
      if (u) {
        setFbUser(u);
        setAuthResolved(true);
      } else {
        fbAuth.signInAnonymously().catch(err => {
          console.warn("Anonymous auth failed:", err);
          setAuthResolved(true);
        });
      }
    });
    return () => unsub();
  }, []);

  // Auto-generate a cloudId for new sessions so save is always ready
  useEffect(() => {
    if (!cloudId) setCloudId(makeShortId());
  }, []);

  // URL-based load on mount (?id=xxx) — public reads allowed
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get("id");
    if (!urlId || !fbDb) return;
    setCloudLoading(true);
    cloudLoad(urlId).then(d => {
      if (d) {
        loadProjectData(d);
        setCloudId(urlId);
        showToast("Loaded shared estimate");
      } else {
        alert("Estimate not found. It may have been deleted or the link is invalid.");
      }
    }).catch(err => {
      console.error("Cloud load failed:", err);
      alert("Failed to load estimate: " + err.message);
    }).finally(() => setCloudLoading(false));
  }, []);

  // Refresh cloud list when switching to My Estimates tab or after save
  const refreshCloudList = async () => {
    if (!fbUser) return;
    setCloudListLoading(true);
    try {
      const items = await cloudList(fbUser.uid);
      setCloudItems(items);
    } catch (e) {
      console.error(e);
      showToast("Failed to load estimates");
    } finally {
      setCloudListLoading(false);
    }
  };

  useEffect(() => {
    if (fbUser && activeTab === "myestimates") refreshCloudList();
  }, [fbUser, activeTab]);

  // ── Cloud actions ──
  const stripDataUrls = (items) => items.map(m => { const { dataUrl, ...rest } = m; return rest; });

  const gatherProjectData = () => ({
    _format: "contract-estimator-project",
    _version: CURRENT_VERSION,
    settings, project, estimates,
    takeoff: { pdfBase64: takeoff.pdfBase64, fileName: takeoff.fileName, pageNum: takeoff.pageNum, zoom: takeoff.zoom, scaleSet: takeoff.scaleSet, scaleRealFt: takeoff.scaleRealFt, scalePx: takeoff.scalePx, pxPerFt: takeoff.pxPerFt, measurements: takeoff.measurements, scalePoints: takeoff.scalePoints },
    proposals: stripDataUrls(proposals), receipts: stripDataUrls(receipts), sitePhotos: stripDataUrls(sitePhotos),
    subBids, changeOrders, signatureImg,
    _cloudMeta: { createdAt: Date.now(), updatedAt: Date.now() },
  });

  const handleSaveToCloud = async () => {
    if (!fbUser) { showToast("Still connecting, try again in a moment"); return; }
    setCloudSaving(true);
    try {
      const id = cloudId || makeShortId();
      const data = gatherProjectData();
      await cloudSave(id, data, fbUser.uid);
      setCloudId(id);
      // Update URL without reloading so subsequent Share Link uses the right id
      const newUrl = window.location.pathname + "?id=" + id;
      window.history.replaceState(null, "", newUrl);
      showToast(cloudId ? "Saved to cloud" : "Saved! Share link ready");
      if (activeTab === "myestimates") refreshCloudList();
    } catch (err) {
      console.error(err);
      alert("Save failed: " + err.message);
    } finally {
      setCloudSaving(false);
    }
  };

  const handleShareLink = () => {
    if (!cloudId) { showToast("Save to cloud first"); return; }
    const url = window.location.origin + window.location.pathname + "?id=" + cloudId;
    copyToClipboard(url);
    showToast("Share link copied to clipboard");
  };

  const handleOpenCloudItem = async (id) => {
    setCloudLoading(true);
    try {
      const d = await cloudLoad(id);
      if (d) {
        loadProjectData(d);
        setCloudId(id);
        window.history.replaceState(null, "", window.location.pathname + "?id=" + id);
        setActiveTab("estimator");
        showToast("Estimate loaded");
      } else {
        alert("Estimate not found");
      }
    } catch (e) {
      alert("Load failed: " + e.message);
    } finally {
      setCloudLoading(false);
    }
  };

  const handleDeleteCloudItem = async (id, name) => {
    if (!confirm(`Permanently delete "${name || id}" from cloud? This cannot be undone.`)) return;
    try {
      await cloudDelete(id, fbUser.uid);
      showToast("Deleted");
      if (cloudId === id) {
        setCloudId(null);
        window.history.replaceState(null, "", window.location.pathname);
      }
      refreshCloudList();
    } catch (e) {
      alert("Delete failed: " + e.message);
    }
  };

  const handleShareCloudItem = (id) => {
    const url = window.location.origin + window.location.pathname + "?id=" + id;
    copyToClipboard(url);
    showToast("Share link copied");
  };

  const handleNewEstimate = () => {
    if (!confirm("Start a new blank estimate? Any unsaved changes will be lost.")) return;
    setCloudId(makeShortId());
    window.history.replaceState(null, "", window.location.pathname);
    setEstimates([ newEstimate("Primary Estimate") ]);
    setActiveEstIdx(0);
    setProject({ estimateNum: "EST-001", date: new Date().toISOString().slice(0, 10), clientName: "", projectName: "", location: "" });
    setProposals([]); setReceipts([]); setSitePhotos([]); setSubBids([]); setChangeOrders([]);
    setTakeoff(prev => ({ ...prev, pdfBase64: null, fileName: "", measurements: [], scalePoints: [], scaleSet: false }));
    setActiveTab("estimator");
    showToast("New estimate started");
  };


  // ── AI handlers ──
  const aiSystemBase = (extra) => {
    const ctx = settings.aiContext ? `\n\nCompany context: ${settings.aiContext}` : "";
    return extra + ctx;
  };

  const handleAiParse = async () => {
    if (!aiInput.trim()) return;
    setAiLoading(true); setAiError(""); setAiParsed([]);
    const system = aiSystemBase(
      "You are an AI estimating assistant for a general contracting company. The user will describe work to be done — ignore any project address or client name and focus only on the scope of work.\n\nReturn a JSON array of work categories. Each category is a parent line item with detailed sub-tasks underneath. Format:\n[\n  {\n    \"description\": \"High-level work category (e.g. Vinyl Plank Flooring)\",\n    \"subItems\": [\n      {\n        \"description\": \"Specific task (e.g. Demo and remove existing flooring)\",\n        \"qty\": 200,\n        \"unit\": \"sqft\",\n        \"materialCost\": 0,\n        \"laborHours\": 4,\n        \"laborRate\": 65\n      }\n    ]\n  }\n]\n\nRules:\n- Group related tasks under one parent. Use separate parents for distinct scopes (e.g. Flooring, Paint, Demo).\n- materialCost is cost PER UNIT in USD (e.g. $2.50/sqft, $15/lf). Use 0 for labor-only tasks.\n- laborRate is realistic hourly rate for the trade (e.g. 55-85 for general labor, 75-110 for electrical/plumbing)\n- laborHours is the TOTAL CREW-HOURS for the entire sub-task — NOT per unit, NOT per sqft. This is the number of hours one or more workers spend on that task in total.\n- CRITICAL LABOR EXAMPLES (never exceed these ratios):\n  * Demo 500 sqft tile = 8-12 total hours (NOT 500)\n  * Install 500 sqft sheet vinyl/LVP = 10-16 total hours (NOT 500)\n  * Paint 1000 sqft walls = 8-14 total hours\n  * Install 100 lf of baseboard = 4-6 total hours\n  * Set 20 doors = 16-20 total hours\n  * Rough electrical 1500 sqft = 20-30 total hours\n- laborHours should almost never exceed 80 for a single sub-task line item. If a task is large, split it into multiple sub-items.\n- Use realistic industry material pricing\n- If quantity unknown, use qty:1 unit:\"ls\""
    );
    try {
      const text = await callClaude([{ role: "user", content: aiInput }], system, 2000);
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) throw new Error("No JSON array in response: " + text.slice(0, 200));
      const items = JSON.parse(match[0]);
      if (!Array.isArray(items) || items.length === 0) throw new Error("Empty or invalid array");
      setAiParsed(items);
    } catch (e) {
      setAiError("AI couldn't generate line items — try describing just the work, e.g. \"demo tile, install LVP flooring 200 sqft\".");
      console.error("AI parse error:", e);
    } finally {
      setAiLoading(false);
    }
  };

  const handleAiAddLines = () => {
    if (!aiParsed.length) return;
    let added = 0;
    setLines(prev => [
      ...prev,
      ...aiParsed.map(p => {
        const subs = (p.subItems || []).map(s => ({
          ...newSubItem(),
          description: String(s.description || ""),
          qty: parseFloat(s.qty) || 1,
          unit: String(s.unit || "ea").toUpperCase(),
          materialCost: parseFloat(s.materialCost) || 0,
          taxable: true,
          laborRate: parseFloat(s.laborRate) || 0,
          laborSTHours: parseFloat(s.laborHours) || 0,
        }));
        added++;
        return { ...newLineItem(), description: String(p.description || ""), subItems: subs, expanded: subs.length > 0 };
      })
    ]);
    setAiParsed([]); setAiInput(""); setAiPanelOpen(false);
    showToast(`Added ${added} line item${added !== 1 ? "s" : ""} with sub-tasks`);
  };

  const handleChatSend = async () => {
    if (!chatInput.trim() || chatLoading) return;
    const userMsg = { role: "user", content: chatInput.trim() };
    const next = [...chatMessages, userMsg];
    setChatMessages(next); setChatInput(""); setChatLoading(true);
    const system = aiSystemBase(
      "You are an AI assistant built into a professional general contracting estimating tool. Help contractors write estimates, phrase line items and exclusions professionally, understand CSI codes, think through job scope, and communicate with clients.\n\nBe direct and concise. Use plain construction industry language. This is a working tool — keep responses practical and to the point."
    );
    try {
      const text = await callClaude(next, system, 600);
      setChatMessages(prev => [...prev, { role: "assistant", content: text }]);
    } catch (e) {
      setChatMessages(prev => [...prev, { role: "assistant", content: "Sorry, I couldn’t connect right now. Try again in a moment." }]);
    } finally {
      setChatLoading(false);
    }
  };

  const updateLine = (id, field, value) => setLines(prev => prev.map(l => l.id === id ? { ...l, [field]: value } : l));
  const addLine = () => setLines(prev => [...prev, newLineItem()]);
  const removeLine = (id) => setLines(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);
  const addSubItem = (lineId) => setLines(prev => prev.map(l => l.id === lineId ? { ...l, subItems: [...l.subItems, newSubItem()], expanded: true } : l));
  const updateSubItem = (lineId, subId, field, value) => setLines(prev => prev.map(l => l.id === lineId ? { ...l, subItems: l.subItems.map(s => s.id === subId ? { ...s, [field]: value } : s) } : l));
  const removeSubItem = (lineId, subId) => setLines(prev => prev.map(l => l.id === lineId ? { ...l, subItems: l.subItems.filter(s => s.id !== subId) } : l));
  const toggleExpand = (lineId) => setLines(prev => prev.map(l => l.id === lineId ? { ...l, expanded: !l.expanded } : l));

  const demoteToSubItem = (lineId) => {
    setLines(prev => {
      const idx = prev.findIndex(l => l.id === lineId);
      if (idx <= 0) return prev;
      const line = prev[idx];
      const sub = { ...newSubItem(), description: line.description, materialCost: parseFloat(line.materialCost) || 0, taxable: !!line.taxable, laborTrade: line.laborTrade || "", laborRate: parseFloat(line.laborRate) || 0, laborSTHours: parseFloat(line.laborSTHours) || 0, qty: parseFloat(line.qty) || 1, unit: line.unit || "EA" };
      return prev.filter(l => l.id !== lineId).map((l, i, arr) => {
        const origIdx = prev.findIndex(p => p.id === l.id);
        return origIdx === idx - 1 ? { ...l, subItems: [...l.subItems, sub], expanded: true } : l;
      });
    });
  };

  // Drag-and-drop reordering
  const dragItem = useRef(null);
  const dragOverItem = useRef(null);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const handleDragStart = (idx) => {
    dragItem.current = idx;
    setDragIdx(idx);
  };
  const handleDragEnter = (idx) => {
    dragOverItem.current = idx;
    setDragOverIdx(idx);
  };
  const handleDragEnd = () => {
    if (dragItem.current !== null && dragOverItem.current !== null && dragItem.current !== dragOverItem.current) {
      setLines(prev => {
        const next = [...prev];
        const [moved] = next.splice(dragItem.current, 1);
        next.splice(dragOverItem.current, 0, moved);
        return next;
      });
    }
    dragItem.current = null;
    dragOverItem.current = null;
    setDragIdx(null);
    setDragOverIdx(null);
  };

  // ── Cost calculations ──
  // Sub-item base: material + labor(trade*hrs)  * qty
  // Tax only on material portion if taxable
  const calcItemMaterialBase = (item) => (parseFloat(item.materialCost) || 0) * (parseFloat(item.qty) || 0);
  const calcItemLaborBase = (item) => getLaborCost(item);
  const calcItemBase = (item) => calcItemMaterialBase(item) + calcItemLaborBase(item);

  const calcSubBase = (sub) => calcItemBase(sub);

  const getLineBaseCost = (line) => {
    if (line.subItems && line.subItems.length > 0) return line.subItems.reduce((sum, s) => sum + calcSubBase(s), 0);
    return calcItemBase(line);
  };

  // Material total for a line (for tax calc)
  const getLineMaterialTaxable = (line) => {
    if (line.subItems && line.subItems.length > 0) {
      return line.subItems.reduce((sum, s) => sum + (s.taxable ? calcItemMaterialBase(s) : 0), 0);
    }
    return line.taxable ? calcItemMaterialBase(line) : 0;
  };

  // Final client price: (base + markup on base) + (tax on taxable material portion after markup)
  const calcFinal = (line) => {
    const base = getLineBaseCost(line);
    const afterMarkup = base * (1 + settings.markup / 100);
    const taxableMat = getLineMaterialTaxable(line) * (1 + settings.markup / 100);
    return afterMarkup + taxableMat * (settings.tax / 100);
  };

  const grandTotal = lines.reduce((sum, l) => sum + calcFinal(l), 0);
  const subtotal = lines.reduce((sum, l) => sum + getLineBaseCost(l), 0);
  const markupAmt = subtotal * (settings.markup / 100);
  const totalTaxableMat = lines.reduce((sum, l) => sum + getLineMaterialTaxable(l), 0);
  const taxAmt = totalTaxableMat * (1 + settings.markup / 100) * (settings.tax / 100);

  // For sub-item display price
  const calcSubFinal = (sub) => {
    const base = calcSubBase(sub);
    const afterMarkup = base * (1 + settings.markup / 100);
    const taxMat = (sub.taxable ? calcItemMaterialBase(sub) : 0) * (1 + settings.markup / 100);
    return afterMarkup + taxMat * (settings.tax / 100);
  };

  // ── Export / Import ──
  const exportFullProject = () => {
    const data = { _format: "contract-estimator-project", _version: 5, settings, project, estimates,
      takeoff: { pdfBase64: takeoff.pdfBase64, fileName: takeoff.fileName, pageNum: takeoff.pageNum, zoom: takeoff.zoom, scaleSet: takeoff.scaleSet, scaleRealFt: takeoff.scaleRealFt, scalePx: takeoff.scalePx, pxPerFt: takeoff.pxPerFt, measurements: takeoff.measurements, scalePoints: takeoff.scalePoints },
      proposals, receipts, sitePhotos, subBids, changeOrders, signatureImg };
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${project.estimateNum||"estimate"}_${project.date}.cep`; a.click();
    setShowExportMenu(false);
  };
  const exportLightweight = () => {
    const stripData = (arr) => arr.map(m => ({ ...m, dataUrl: "(stripped)" }));
    const data = { _format: "contract-estimator-project", _version: 5, settings, project, estimates,
      takeoff: { fileName: takeoff.fileName, scaleSet: takeoff.scaleSet, scaleRealFt: takeoff.scaleRealFt, scalePx: takeoff.scalePx, pxPerFt: takeoff.pxPerFt, measurements: takeoff.measurements, scalePoints: takeoff.scalePoints },
      proposals: stripData(proposals), receipts: stripData(receipts), sitePhotos: stripData(sitePhotos),
      subBids: subBids.map(s => ({ ...s, proposalPdf: s.proposalPdf ? { ...s.proposalPdf, dataUrl: "(stripped)" } : null })),
      changeOrders, signatureImg: "(stripped)" };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${project.estimateNum||"estimate"}_${project.date}.json`; a.click();
    setShowExportMenu(false);
  };
  const loadProjectData = (d) => {
    // Firebase strips empty arrays and turns undefined into null on round-trip,
    // which can leave qualification/exclusion items with subs === null/undefined.
    // Normalize them so every item has a valid subs array.
    const normSubs = (arr) => (arr || []).map(item => ({
      text: (item && item.text) || "",
      subs: (item && Array.isArray(item.subs)) ? item.subs : [],
    }));
    if (d.settings) setSettings(s => ({ ...s, ...d.settings }));
    if (d.project) setProject(d.project);
    // Handle new estimates array or old single-estimate format
    if (d.estimates) {
      setEstimates(d.estimates.map(est => ({
        ...est,
        lines: (est.lines || []).map(l => ({ ...newLineItem(), ...l, subItems: (l.subItems || []).map(s => ({ ...newSubItem(), ...s })) })),
        qualifications: est.qualifications ? normSubs(est.qualifications) : deepCopy(DEFAULT_QUALS),
        exclusions: est.exclusions ? normSubs(est.exclusions) : deepCopy(DEFAULT_EXCL),
        closingNote: est.closingNote || "",
      })));
      setActiveEstIdx(0);
    } else if (d.lines) {
      setEstimates([{
        id: uid(), name: "Primary Estimate",
        lines: d.lines.map(l => ({ ...newLineItem(), ...l, subItems: (l.subItems || []).map(s => ({ ...newSubItem(), ...s })) })),
        qualifications: d.qualifications ? normSubs(d.qualifications) : deepCopy(DEFAULT_QUALS),
        exclusions: d.exclusions ? normSubs(d.exclusions) : deepCopy(DEFAULT_EXCL),
        closingNote: d.closingNote || "",
      }]);
      setActiveEstIdx(0);
    }
    if (d.takeoff) setTakeoff(prev => ({ ...prev, pdfBase64: d.takeoff.pdfBase64 || null, fileName: d.takeoff.fileName || "", pageNum: d.takeoff.pageNum || 1, zoom: d.takeoff.zoom || 1, scaleSet: d.takeoff.scaleSet || false, scaleRealFt: d.takeoff.scaleRealFt || "", scalePx: d.takeoff.scalePx || 0, pxPerFt: d.takeoff.pxPerFt || 0, measurements: (d.takeoff.measurements || []).map(m => ({ ...m, type: m.type || "length" })), scalePoints: d.takeoff.scalePoints || [], currentPoints: [], drawingScale: false, activeLabel: "", activeColor: TAKEOFF_COLORS[0], measureMode: "length" }));
    const hasMedia = (m) => (m.url || (m.dataUrl && m.dataUrl !== "(stripped)"));
    if (d.proposals) setProposals(d.proposals.filter(hasMedia));
    if (d.receipts) setReceipts(d.receipts.filter(hasMedia));
    if (d.sitePhotos) setSitePhotos(d.sitePhotos.filter(hasMedia));
    if (d.subBids) setSubBids(d.subBids.map(s => ({
      ...s,
      proposalPdf: s.proposalPdf && (s.proposalPdf.url || (s.proposalPdf.dataUrl && s.proposalPdf.dataUrl !== "(stripped)")) ? s.proposalPdf : null,
      bids: s.bids || [],
    })));
    if (d.changeOrders) setChangeOrders(d.changeOrders);
    if (d.signatureImg && d.signatureImg !== "(stripped)") setSignatureImg(d.signatureImg);
  };

  const importProject = () => {
    const input = document.createElement("input"); input.type = "file"; input.accept = ".json,.cep";
    input.onchange = (e) => { const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader(); reader.onload = (ev) => { try {
        const d = JSON.parse(ev.target.result);
        loadProjectData(d);
      } catch (err) { alert("Invalid file: " + err.message); } }; reader.readAsText(file); };
    input.click(); setShowExportMenu(false);
  };

  const printProposal = () => { setShowProposal(true); setTimeout(() => window.print(), 400); };
  const resetDefaults = () => { setQualifications(deepCopy(DEFAULT_QUALS)); setExclusions(deepCopy(DEFAULT_EXCL)); };
  const getGroups = () => {
    const active = lines.filter(l => l.description || l.workCode);
    const map = new Map();
    active.forEach(l => { const key = l.workCode || "(no code)"; if (!map.has(key)) map.set(key, []); map.get(key).push(l); });
    return Array.from(map.entries()).map(([code, items]) => ({ code, items, subtotal: items.reduce((s, l) => s + calcFinal(l), 0) }));
  };

  useEffect(() => { if (!showExportMenu) return; const h = () => setShowExportMenu(false); document.addEventListener("click", h, true); return () => document.removeEventListener("click", h, true); }, [showExportMenu]);

  // ── Labor trade selector component ──
  const TradeSelector = ({ item, onChange }) => {
    const handleTradeChange = (e) => {
      const trade = e.target.value;
      if (trade === "" || trade === "Custom") {
        onChange("laborTrade", trade);
        if (trade === "") onChange("laborRate", 0);
      } else {
        const r = LABOR_RATES.find(x => x.trade === trade);
        if (r) { onChange("laborTrade", trade); onChange("laborRate", r.st); }
      }
    };
    const handleRateChange = (e) => {
      onChange("laborRate", e.target.value);
      const r = LABOR_RATES.find(x => x.trade === item.laborTrade);
      if (r && parseFloat(e.target.value) !== r.st) {
        onChange("laborTrade", "Custom");
      }
    };
    const showFields = item.laborTrade || (parseFloat(item.laborRate) > 0);
    const hasOT = parseFloat(item.laborOTHours) > 0;
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
          <select className="trade-select" value={item.laborTrade} onChange={handleTradeChange} style={{ flex: "1 1 65px", minWidth: 55 }}>
            <option value="">None</option>
            {LABOR_RATES.map(r => <option key={r.trade} value={r.trade}>{r.trade}</option>)}
            <option value="Custom">Custom</option>
          </select>
          {showFields && <>
            <input className="cost-input" type="number" min="0" step="0.01"
              value={item.laborRate || ""} onChange={handleRateChange}
              placeholder="$/hr" title="Labor rate per hour"
              style={{ width: 58, fontSize: 11 }} />
            <div style={{ display: "flex", alignItems: "center", gap: 1 }}>
              <span style={{ fontSize: 9, color: "#666", fontWeight: 600 }}>ST</span>
              <input className="qty-input" type="number" min="0" step="0.5"
                value={item.laborSTHours || ""} onChange={e => onChange("laborSTHours", e.target.value)}
                placeholder="0" title="Straight-time hours"
                style={{ width: 40, fontSize: 11 }} />
            </div>
          </>}
        </div>
        {showFields && (
          <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 1, flex: "0 0 auto" }}>
              <span style={{ fontSize: 9, color: hasOT ? "#e74c3c" : "#999", fontWeight: 700 }}>OT</span>
              <input className="qty-input" type="number" min="0" step="0.5"
                value={item.laborOTHours || ""} onChange={e => onChange("laborOTHours", e.target.value)}
                placeholder="0" title="Overtime hours"
                style={{ width: 40, fontSize: 11, borderColor: hasOT ? "#e7a0a0" : undefined }} />
              <span style={{ fontSize: 9, color: "#666", fontWeight: 600 }}>hrs @</span>
              <input className="qty-input" type="number" min="0" step="5"
                value={item.laborOTPct} onChange={e => onChange("laborOTPct", e.target.value)}
                title="Overtime percentage (50 = 1.5× rate)"
                style={{ width: 42, fontSize: 11, fontWeight: 600, color: "#e74c3c", textAlign: "center" }} />
              <span style={{ fontSize: 9, color: "#888", fontWeight: 600 }}>%</span>
            </div>
          </div>
        )}
      </div>
    );
  };

  // Labor display for read-only summary
  const laborSummary = (item) => {
    const cost = getLaborCost(item);
    if (cost === 0) return "";
    const otH = parseFloat(item.laborOTHours) || 0;
    const stH = parseFloat(item.laborSTHours) || 0;
    let s = `${item.laborTrade || "Custom"} $${item.laborRate}/hr`;
    if (stH > 0) s += ` ${stH}h ST`;
    if (otH > 0) s += ` + ${otH}h OT@${item.laborOTPct}%`;
    return s + ` = ${fmt(cost)}`;
  };

  return (
    <>
    {!authResolved || cloudLoading ? (
      <div className="login-wrap">
        <div className="login-card" style={{ textAlign: "center" }}>
          <h2>Contract Estimator</h2>
          <div className="login-sub">{cloudLoading ? "Loading estimate..." : "Connecting..."}</div>
        </div>
      </div>
    ) : (
    <div className="app-container">
      <div className="app-header">
        <div><h1>Contract Estimator</h1><div className="subtitle">CSI-coded estimation with built-in markup & tax</div></div>
        <div className="header-actions">
          <button className="cloud-btn" onClick={handleSaveToCloud} disabled={cloudSaving} title="Save this estimate to the cloud">
            {cloudSaving ? "Saving..." : "☁ Save to Cloud"}
          </button>
          {cloudId && (
            <button className="cloud-btn share" onClick={handleShareLink} title="Copy a public read-only link">
              🔗 Share Link
            </button>
          )}
          <button onClick={handleNewEstimate} title="Start a new blank estimate">+ New</button>
          <button onClick={importProject}>Import</button>
          <div className="export-menu">
            <button onClick={(e) => { e.stopPropagation(); setShowExportMenu(!showExportMenu); }}>Export &#9662;</button>
            {showExportMenu && (() => {
              const mediaSizeKB = [...proposals, ...receipts, ...sitePhotos].reduce((s, m) => s + (m.sizeKB || Math.round((m.dataUrl||"").length * 3 / 4 / 1024)), 0);
              const bidPdfSizeKB = subBids.reduce((s, sub) => s + (sub.proposalPdf ? Math.round((sub.proposalPdf.dataUrl||"").length * 3 / 4 / 1024) : 0), 0);
              const pdfSizeKB = takeoff.pdfBase64 ? Math.round(takeoff.pdfBase64.length * 3 / 4 / 1024) : 0;
              const fullSizeMB = ((mediaSizeKB + bidPdfSizeKB + pdfSizeKB) / 1024 + 0.1).toFixed(1);
              return <div className="export-dropdown">
              <button onClick={exportFullProject}><span className="drop-icon">&#128230;</span><div><div className="drop-label">Full Project (.cep) <span style={{ fontWeight: 400, color: "#888" }}>~{fullSizeMB} MB</span></div><div className="drop-desc">Everything including media & PDF — fully shareable</div></div></button>
              <div className="drop-sep"></div>
              <button onClick={exportLightweight}><span className="drop-icon">&#128196;</span><div><div className="drop-label">Lightweight (.json)</div><div className="drop-desc">Estimator + measurements only, no media</div></div></button>
              <div className="drop-sep"></div>
              <div style={{ padding: "10px 16px", fontSize: 10, color: "#888", lineHeight: 1.5 }}>
                <strong style={{ color: "#555" }}>Sharing tips:</strong><br/>
                · Under 25 MB — email as attachment (rename .cep to .json if blocked)<br/>
                · Over 25 MB — use Google Drive, Dropbox, or WeTransfer<br/>
                · Recipient opens the .cep file using this same app via Import
              </div>
            </div>;
            })()}
          </div>
        </div>
      </div>


      <div className="tab-bar">
        <button className={`tab-btn ${activeTab === "estimator" ? "active" : ""}`} onClick={() => setActiveTab("estimator")}>&#128221; Estimator</button>
        <button className={`tab-btn ${activeTab === "myestimates" ? "active" : ""}`} onClick={() => setActiveTab("myestimates")}>&#9729; My Estimates{cloudItems.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{cloudItems.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "takeoff" ? "active" : ""}`} onClick={() => setActiveTab("takeoff")}>&#128208; Takeoff{takeoff.measurements.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{takeoff.measurements.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "proposals" ? "active" : ""}`} onClick={() => setActiveTab("proposals")}>&#128203; Proposals{proposals.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{proposals.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "receipts" ? "active" : ""}`} onClick={() => setActiveTab("receipts")}>&#129534; Receipts{receipts.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{receipts.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "photos" ? "active" : ""}`} onClick={() => setActiveTab("photos")}>&#128247; Site Photos{sitePhotos.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{sitePhotos.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "bids" ? "active" : ""}`} onClick={() => setActiveTab("bids")}>&#9878; Bid Compare{subBids.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{subBids.length}</span>}</button>
        <button className={`tab-btn ${activeTab === "changeorders" ? "active" : ""}`} onClick={() => setActiveTab("changeorders")}>&#128220; Change Orders{changeOrders.length > 0 && <span className="file-badge" style={{ marginLeft: 6 }}>{changeOrders.length}</span>}</button>
      </div>

      {activeTab === "myestimates" && (
        <div className="card">
          <div className="card-title">
            <span>☁ My Cloud Estimates</span>
            <button onClick={refreshCloudList} disabled={cloudListLoading}>{cloudListLoading ? "Loading..." : "↻ Refresh"}</button>
          </div>
          {cloudListLoading ? (
            <div className="cloud-loading">Loading your estimates...</div>
          ) : cloudItems.length === 0 ? (
            <div className="cloud-empty">
              No cloud estimates yet.<br/>
              <span style={{ fontSize: 11 }}>Save your current estimate using the ☁ Save to Cloud button in the header.</span>
            </div>
          ) : (
            <div className="cloud-list">
              {cloudItems.map(item => {
                const title = item.projectName || item.clientName || item.estimateNum || "(untitled)";
                const subtitle = [item.estimateNum, item.clientName, item.location].filter(Boolean).join(" • ");
                const updatedStr = item.updatedAt ? new Date(item.updatedAt).toLocaleString() : "";
                const isCurrent = cloudId === item.id;
                return (
                  <div key={item.id} className="cloud-item" style={isCurrent ? { borderColor: "#0f3460", background: "#f8f9ff" } : {}}>
                    <div className="cloud-item-info">
                      <div className="cloud-item-title">
                        {title}
                        {isCurrent && <span style={{ marginLeft: 8, fontSize: 10, fontWeight: 600, color: "#0f3460", background: "#e8f0ff", padding: "2px 8px", borderRadius: 10 }}>CURRENT</span>}
                      </div>
                      <div className="cloud-item-meta">
                        {subtitle && <span>{subtitle}</span>}
                        {updatedStr && <span>🕐 {updatedStr}</span>}
                        {item.companyName && <span>🏢 {item.companyName}</span>}
                      </div>
                    </div>
                    <div className="cloud-item-actions">
                      <button className="open-btn" onClick={() => handleOpenCloudItem(item.id)}>Open</button>
                      <button className="share-btn" onClick={() => handleShareCloudItem(item.id)} title="Copy share link">🔗</button>
                      <button className="del-btn" onClick={() => handleDeleteCloudItem(item.id, title)} title="Delete">🗑</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div style={{ display: activeTab === "takeoff" ? "block" : "none" }}><TakeoffPage takeoff={takeoff} setTakeoff={setTakeoff} visible={activeTab === "takeoff"}
        onAddLineItem={({ description, qty, unit }) => {
          setLines(prev => {
            const existing = prev.find(l => l.description === description && l.unit === unit);
            if (existing) {
              return prev.map(l => l.id === existing.id
                ? { ...l, qty: Math.round(((parseFloat(l.qty) || 0) + qty) * 100) / 100 }
                : l
              );
            }
            return [...prev, { ...newLineItem(), description, qty, unit }];
          });
        }} /></div>

      <div style={{ display: activeTab === "proposals" ? "block" : "none" }}>
        <MediaGallery title="Proposals & Documents" icon="&#128203;" items={proposals} onChange={setProposals}
          emptyMsg="Upload proposal documents, contracts, change orders, or any project documents." cloudId={cloudId} />
      </div>

      <div style={{ display: activeTab === "receipts" ? "block" : "none" }}>
        <MediaGallery title="Receipts & Invoices" icon="&#129534;" items={receipts} onChange={setReceipts}
          emptyMsg="Upload receipts, invoices, purchase orders, or material slips." cloudId={cloudId} />
      </div>

      <div style={{ display: activeTab === "photos" ? "block" : "none" }}>
        <MediaGallery title="Site Photos & Videos" icon="&#128247;" items={sitePhotos} onChange={setSitePhotos}
          emptyMsg="Upload site photos, progress pics, before/after shots, or walkthrough videos." cloudId={cloudId} />
      </div>

      <div style={{ display: activeTab === "bids" ? "block" : "none" }}>
        <BidCompare subs={subBids} setSubs={setSubBids} cloudId={cloudId} />
      </div>

      <div style={{ display: activeTab === "changeorders" ? "block" : "none" }}>
        <ChangeOrderPage changeOrders={changeOrders} setChangeOrders={setChangeOrders}
          settings={settings} project={project} signatureImg={signatureImg} setSignatureImg={setSignatureImg} />
      </div>

      <div style={{ display: activeTab === "estimator" ? "block" : "none" }}>

      {/* ── Estimate Selector ── */}
      <div className="est-selector">
        <span className="est-label">Estimates:</span>
        {estimates.map((est, i) => (
          <button key={est.id} className={`est-tab ${i === activeEstIdx ? "active" : ""}`}
            onClick={() => setActiveEstIdx(i)}
            onDoubleClick={() => {
              const name = prompt("Rename estimate:", est.name);
              if (name !== null && name.trim()) renameEstimate(i, name.trim());
            }}>
            {est.name}
            {estimates.length > 1 && <span className="est-close" onClick={e => { e.stopPropagation(); removeEstimate(i); }} title="Delete">×</span>}
          </button>
        ))}
        <button className="est-add-btn" onClick={addEstimate} title="Create new blank estimate">+ New</button>
        <button className="est-add-btn" onClick={duplicateEstimate} title="Duplicate current estimate">&#10697; Duplicate</button>
      </div>

      {/* ── Settings ── */}
      <div className="card">
        <div className="card-title"><span>Company Settings & Rates</span><button onClick={() => setShowSettings(!showSettings)}>{showSettings ? "Collapse" : "Expand"}</button></div>
        {showSettings && <>
          <div className="grid-3" style={{ marginBottom: 12 }}>
            <div className="field"><label>Company Name</label><input value={settings.companyName} onChange={e => setSettings(s => ({...s, companyName: e.target.value}))} placeholder="A. Michaels Construction, LLC" /></div>
            <div className="field"><label>Address</label><input value={settings.companyAddress} onChange={e => setSettings(s => ({...s, companyAddress: e.target.value}))} placeholder="4 Stirrup Ct. Lemont, IL 60439" /></div>
            <div className="field"><label>Phone</label><input value={settings.companyPhone} onChange={e => setSettings(s => ({...s, companyPhone: e.target.value}))} placeholder="630-800-0907" /></div>
          </div>
          <div className="grid-3">
            <div className="field"><label>Email</label><input value={settings.companyEmail} onChange={e => setSettings(s => ({...s, companyEmail: e.target.value}))} placeholder="info@company.com" /></div>
            <div className="field"><label>Markup %</label><input className="rate-input" type="number" value={settings.markup} onChange={e => setSettings(s => ({...s, markup: parseFloat(e.target.value) || 0}))} /></div>
            <div className="field"><label>Sales Tax % (materials only)</label><input className="rate-input" type="number" value={settings.tax} onChange={e => setSettings(s => ({...s, tax: parseFloat(e.target.value) || 0}))} /></div>
          </div>
        </>}
      </div>

      {/* ── Project Info ── */}
      <div className="card">
        <div className="card-title">Project Information</div>
        <div className="grid-3">
          <div className="field"><label>Client Name</label><input value={project.clientName} onChange={e => setProject(p => ({...p, clientName: e.target.value}))} placeholder="Client / Company Name" /></div>
          <div className="field"><label>Project Name</label><input value={project.projectName} onChange={e => setProject(p => ({...p, projectName: e.target.value}))} placeholder="Weekend Maintenance Scope" /></div>
          <div className="field"><label>Location / Site</label><input value={project.location} onChange={e => setProject(p => ({...p, location: e.target.value}))} placeholder="123 Client Blvd, City, ST" /></div>
        </div>
        <div className="grid-3" style={{ marginTop: 10 }}>
          <div className="field"><label>Estimate #</label><input value={project.estimateNum} onChange={e => setProject(p => ({...p, estimateNum: e.target.value}))} /></div>
          <div className="field"><label>Date</label><input type="date" value={project.date} onChange={e => setProject(p => ({...p, date: e.target.value}))} /></div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 10 }}>
            <span style={{ fontSize: 11, color: "#888", paddingBottom: 10 }}>
              Markup: <strong style={{ color: "#0f3460" }}>{settings.markup}%</strong> &nbsp;|&nbsp;
              Tax: <strong style={{ color: "#0f3460" }}>{settings.tax}%</strong> (materials) &nbsp;|&nbsp;
              Markup mult: <strong style={{ color: "#27ae60" }}>{(1 + settings.markup/100).toFixed(4)}x</strong>
            </span>
          </div>
        </div>
      </div>

      {/* ── Line Items ── */}
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "16px 20px 0" }}>
          <div className="card-title" style={{ marginBottom: 10 }}>
            <span>Line Items — Scope of Work</span>
            <span style={{ fontSize: 11, color: "#888", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>{lines.length} item{lines.length !== 1 ? "s" : ""}</span>
          </div>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table className="line-table">
            <thead><tr>
              <th style={{ width: 24 }}></th>
              <th style={{ width: 24 }}></th>
              <th style={{ width: 24 }}></th>
              <th style={{ width: 80 }}>Work Code</th>
              <th style={{ minWidth: 140 }}>Description</th>
              <th style={{ width: 110 }}>CSI Div</th>
              <th style={{ width: 42 }}>Qty</th>
              <th style={{ width: 40 }}>Unit</th>
              <th style={{ width: 75 }}>Material $</th>
              <th style={{ width: 30, textAlign: "center" }} title="Taxable material">Tax</th>
              <th style={{ width: 240 }}>Labor</th>
              <th style={{ width: 110 }}>Link</th>
              <th style={{ width: 100, textAlign: "right", paddingRight: 8 }}>Client Price</th>
              <th style={{ width: 64 }}></th>
            </tr></thead>
            <tbody>
              {lines.map((line, idx) => {
                const hasSubs = line.subItems && line.subItems.length > 0;
                const subBase = hasSubs ? line.subItems.reduce((s, si) => s + calcSubBase(si), 0) : 0;
                return (
                  <React.Fragment key={line.id}>
                    <tr draggable onDragStart={() => handleDragStart(idx)} onDragEnter={() => handleDragEnter(idx)} onDragEnd={handleDragEnd} onDragOver={e => e.preventDefault()} className={`${dragIdx === idx ? "dragging" : ""} ${dragOverIdx === idx && dragIdx !== idx ? "drag-over" : ""}`}>
                      <td style={{ textAlign: "center" }}><span className="drag-handle" title="Drag to reorder">&#9776;</span></td>
                      <td style={{ textAlign: "center", color: "#aaa", fontSize: 10 }}>{idx + 1}</td>
                      <td style={{ textAlign: "center" }}>{hasSubs && <button className={`expand-btn ${line.expanded ? "open" : ""}`} onClick={() => toggleExpand(line.id)}>{line.expanded ? "−" : "+"}</button>}</td>
                      <td><input value={line.workCode} onChange={e => updateLine(line.id, "workCode", e.target.value)} placeholder="WC-001" /></td>
                      <td><input value={line.description} onChange={e => updateLine(line.id, "description", e.target.value)} placeholder="Description" /></td>
                      <td><select className="csi-select" value={line.csiDiv} onChange={e => updateLine(line.id, "csiDiv", e.target.value)}>{CSI_DIVISIONS.map(d => <option key={d.code} value={d.code}>{d.code} – {d.name}</option>)}</select></td>
                      {hasSubs ? (
                        <td colSpan={5} style={{ fontSize: 10, color: "#888", textAlign: "center", fontStyle: "italic" }}>
                          {line.subItems.length} sub-item{line.subItems.length !== 1 ? "s" : ""} &mdash; base: {fmt(subBase)}
                        </td>
                      ) : (<>
                        <td><input className="qty-input" type="number" min="0" step="1" value={line.qty || ""} onChange={e => updateLine(line.id, "qty", e.target.value)} placeholder="1" /></td>
                        <td><input style={{ textAlign: "center" }} value={line.unit} onChange={e => updateLine(line.id, "unit", e.target.value)} placeholder="EA" /></td>
                        <td><input className="cost-input" type="number" min="0" step="0.01" value={line.materialCost || ""} onChange={e => updateLine(line.id, "materialCost", e.target.value)} placeholder="0.00" /></td>
                        <td style={{ textAlign: "center" }}><input type="checkbox" className="tax-check" checked={!!line.taxable} onChange={e => updateLine(line.id, "taxable", e.target.checked)} title="Material is taxable" /></td>
                        <td><TradeSelector item={line} onChange={(f, v) => updateLine(line.id, f, v)} /></td>
                      </>)}
                      {hasSubs ? <td></td> : (
                        <td><div className="link-cell"><input value={line.link||""} onChange={e => updateLine(line.id, "link", e.target.value)} placeholder="URL..." />{line.link && <a href={line.link} target="_blank" rel="noopener noreferrer">&#8599;</a>}</div></td>
                      )}
                      <td className="final-price">{fmt(calcFinal(line))}</td>
                      <td style={{ whiteSpace: "nowrap" }}><button className="add-sub-btn" onClick={() => addSubItem(line.id)}>+ Sub</button><button className="add-sub-btn" onClick={() => demoteToSubItem(line.id)} title="Move this line under the one above it" style={{ marginLeft: 2 }}>↳</button><button className="remove-btn" onClick={() => removeLine(line.id)}>×</button></td>
                    </tr>
                    {hasSubs && line.expanded && line.subItems.map((sub, si) => (
                      <tr key={sub.id} className="sub-line-row">
                        <td></td>
                        <td></td>
                        <td style={{ textAlign: "right", paddingRight: 0 }}><span className="sub-line-indicator"></span></td>
                        <td style={{ fontSize: 9, color: "#999", textAlign: "center" }}>{idx+1}.{si+1}</td>
                        <td><input value={sub.description} onChange={e => updateSubItem(line.id, sub.id, "description", e.target.value)} placeholder="Sub-item" style={{ fontSize: 10, background: "#f0f2f5" }} /></td>
                        <td></td>
                        <td><input className="qty-input" type="number" min="0" step="1" value={sub.qty || ""} onChange={e => updateSubItem(line.id, sub.id, "qty", e.target.value)} placeholder="1" style={{ fontSize: 10, background: "#f0f2f5" }} /></td>
                        <td><input style={{ textAlign: "center", fontSize: 10, background: "#f0f2f5" }} value={sub.unit} onChange={e => updateSubItem(line.id, sub.id, "unit", e.target.value)} placeholder="EA" /></td>
                        <td><input className="cost-input" type="number" min="0" step="0.01" value={sub.materialCost || ""} onChange={e => updateSubItem(line.id, sub.id, "materialCost", e.target.value)} placeholder="0.00" style={{ fontSize: 10, background: "#f0f2f5" }} /></td>
                        <td style={{ textAlign: "center" }}><input type="checkbox" className="tax-check" checked={!!sub.taxable} onChange={e => updateSubItem(line.id, sub.id, "taxable", e.target.checked)} /></td>
                        <td><TradeSelector item={sub} onChange={(f, v) => updateSubItem(line.id, sub.id, f, v)} /></td>
                        <td></td>
                        <td style={{ textAlign: "right", fontSize: 9, color: "#999", fontVariantNumeric: "tabular-nums", paddingRight: 8 }}>base: {fmt(calcSubBase(sub))}</td>
                        <td><button className="remove-btn" onClick={() => removeSubItem(line.id, sub.id)} style={{ fontSize: 14 }}>×</button></td>
                      </tr>
                    ))}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="totals-bar">
          <div className="totals-bar-inner">
            <div className="total-item"><div className="total-label">Base Cost</div><div className="total-sub">{fmt(subtotal)}</div></div>
            <div className="total-item"><div className="total-label">+ Markup ({settings.markup}%)</div><div className="total-sub">{fmt(markupAmt)}</div></div>
            <div className="total-item"><div className="total-label">+ Tax ({settings.tax}% mat.)</div><div className="total-sub">{fmt(taxAmt)}</div></div>
            <div className="total-item" style={{ borderLeft: "1px solid rgba(255,255,255,0.2)", paddingLeft: 20 }}><div className="total-label">Grand Total</div><div className="total-value">{fmt(grandTotal)}</div></div>
          </div>
        </div>
      </div>

      {showGrouped && <div className="card"><div className="card-title"><span>Subtotals by Work Code</span><button onClick={() => setShowGrouped(false)}>Hide</button></div><div>{getGroups().map(g => (<div className="group-block" key={g.code}><div className="group-header"><span>{g.code}</span><span className="group-subtotal">{fmt(g.subtotal)}</span></div><div className="group-lines">{g.items.map(l => (<div className="gl-row" key={l.id}><span className="gl-desc">{l.description || "(no description)"}</span><span className="gl-amt">{fmt(calcFinal(l))}</span></div>))}</div></div>))}</div></div>}

      <div className="card">
        <div className="card-title"><span>Qualifications, Clarifications & Exclusions</span><div style={{ display: "flex", gap: 6 }}><button onClick={resetDefaults}>Reset Defaults</button><button onClick={() => setShowQualExcl(!showQualExcl)}>{showQualExcl ? "Collapse" : "Edit"}</button></div></div>
        {showQualExcl ? (<div>
          <SectionEditor title="Qualifications and Clarifications Apply" items={qualifications} onChange={setQualifications} color="#0f3460" />
          <SectionEditor title="Excluded Items" items={exclusions} onChange={setExclusions} color="#c0392b" />
          <div className="field" style={{ marginTop: 12 }}><label>Closing Note</label><textarea value={closingNote} onChange={e => setClosingNote(e.target.value)} rows={2} placeholder="Thank you..." /></div>
        </div>) : (<div style={{ fontSize: 11, color: "#888" }}>{qualifications.length} qualification{qualifications.length !== 1 ? "s" : ""}, {exclusions.length} exclusion{exclusions.length !== 1 ? "s" : ""} configured. Click "Edit" to modify.</div>)}
      </div>

      {/* ── AI Assist panel ── */}
      {aiPanelOpen && (
        <div className="ai-panel">
          <div className="ai-panel-title">&#10024; AI Estimating Assistant</div>
          <textarea
            className="ai-textarea"
            placeholder={"Describe the work in plain English...\n\nExample: \"Demo and replace 200 sqft of tile in a bathroom. Install new 12x24 porcelain tile with schluter edge trim, grout and seal.\""}
            value={aiInput}
            onChange={e => setAiInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) handleAiParse(); }}
            rows={4}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
            <button className="ai-btn" onClick={handleAiParse} disabled={aiLoading || !aiInput.trim()}>
              {aiLoading ? "Thinking..." : "Parse to Line Items →"}
            </button>
            {aiParsed.length > 0 && (
              <button className="ai-btn" onClick={handleAiAddLines} style={{ background: "#1a7a4a" }}>
                + Add {aiParsed.length} Item{aiParsed.length !== 1 ? "s" : ""} to Estimate
              </button>
            )}
            <button className="ai-btn-sec" onClick={() => { setAiPanelOpen(false); setAiParsed([]); setAiInput(""); setAiError(""); }}>Cancel</button>
          </div>
          {aiError && <div className="ai-error">{aiError}</div>}
          {aiParsed.length > 0 && (
            <div className="ai-preview" style={{ marginTop: 12 }}>
              {aiParsed.map((p, i) => (
                <div key={i}>
                  {(() => {
                    const catTotal = (p.subItems || []).reduce((acc, s) => acc + (parseFloat(s.qty)||1)*(parseFloat(s.materialCost)||0) + (parseFloat(s.laborHours)||0)*(parseFloat(s.laborRate)||0), 0);
                    return (
                      <div style={{ padding: "8px 12px", background: "#1a1a2e", color: "white", fontWeight: 700, fontSize: 11, display: "flex", alignItems: "center", gap: 6 }}>
                        <span>📁</span><span>{p.description}</span>
                        <span style={{ marginLeft: "auto", opacity: 0.6, fontWeight: 400 }}>{(p.subItems||[]).length} sub-task{(p.subItems||[]).length !== 1 ? "s" : ""}</span>
                        <span style={{ marginLeft: 12, color: "#7ec8a0" }}>${catTotal.toLocaleString("en-US", { maximumFractionDigits: 0 })} base</span>
                      </div>
                    );
                  })()}
                  {(p.subItems || []).map((s, si) => {
                    const matTotal = (parseFloat(s.qty) || 1) * (parseFloat(s.materialCost) || 0);
                    const labTotal = (parseFloat(s.laborHours) || 0) * (parseFloat(s.laborRate) || 0);
                    const rawTotal = matTotal + labTotal;
                    const warn = rawTotal > 50000 || (parseFloat(s.laborHours) || 0) > 80;
                    return (
                      <div key={si} className="ai-preview-row" style={{ paddingLeft: 24, fontSize: 11, background: warn ? "#fff8e6" : undefined }}>
                        <span style={{ color: "#888", marginRight: 4 }}>↳</span>
                        <span style={{ flex: 1 }} title={s.description}>{s.description}</span>
                        <span style={{ color: "#666", marginLeft: 8 }}>{s.qty} {s.unit}</span>
                        <span style={{ color: "#0f3460", marginLeft: 12, fontWeight: 600 }}>${parseFloat(s.materialCost || 0).toFixed(2)}/unit</span>
                        <span style={{ color: "#555", marginLeft: 12 }}>{parseFloat(s.laborHours || 0).toFixed(1)}h @ ${parseFloat(s.laborRate || 0)}/hr</span>
                        <span style={{ marginLeft: 12, fontWeight: 700, color: warn ? "#c0392b" : "#1a7a4a" }}>
                          {warn ? "⚠ " : ""}${rawTotal.toLocaleString("en-US", { maximumFractionDigits: 0 })}
                        </span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div className="action-bar">
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button className="btn-add" onClick={addLine}>+ Line Item</button>
          <button className="btn-add" onClick={() => { setAiPanelOpen(o => !o); setAiParsed([]); setAiError(""); }} style={{ background: aiPanelOpen ? "#1a1a2e" : "linear-gradient(135deg,#0f3460,#1a2a6e)", color: "white", border: "none", fontWeight: 700 }}>&#10024; AI Assist</button>
          <button className="btn-add" onClick={() => setShowGrouped(!showGrouped)} style={{ borderStyle: "solid", background: showGrouped ? "#0f3460" : undefined, color: showGrouped ? "white" : undefined }}>{showGrouped ? "Hide Subtotals" : "Subtotals by Code"}</button>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn-primary" onClick={() => setShowProposal(true)}>&#128196; Preview</button>
          <button className="btn-generate" onClick={printProposal}>Print / PDF</button>
        </div>
      </div>

      {/* ── Proposal Modal ── */}
      {showProposal && (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) setShowProposal(false); }}>
          <div className="modal-content">
            <div className="modal-toolbar"><span style={{ fontWeight: 600, fontSize: 13 }}>Proposal Preview — {activeEst.name}</span><div style={{ display: "flex", gap: 8 }}><button onClick={() => window.print()} style={{ background: "#27ae60", color: "white", border: "none" }}>Print / Save PDF</button><button onClick={() => setShowProposal(false)} style={{ background: "#eee", color: "#333", border: "1px solid #ddd" }}>Close</button></div></div>
            <div className="proposal-doc" id="proposal-print" ref={printRef}>
              <div className="company-header"><div><div className="company-name">{settings.companyName || "[Your Company Name]"}</div><div className="company-detail">{settings.companyAddress}</div><div className="company-detail">{[settings.companyPhone, settings.companyEmail].filter(Boolean).join("  |  ")}</div></div><div className="proposal-badge">PROPOSAL</div></div>
              <div className="meta-grid">
                <span className="meta-label">Proposal #:</span><span>{project.estimateNum}</span>
                <span className="meta-label">Date:</span><span>{project.date ? new Date(project.date+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}) : ""}</span>
                <span className="meta-label">Client:</span><span>{project.clientName}</span>
                <span className="meta-label">Location:</span><span>{project.location}</span>
                <span className="meta-label">Project:</span><span>{project.projectName}</span><span></span><span></span>
              </div>
              <div className="section-title">Scope of Work</div>
              <p style={{ fontSize: 11, marginBottom: 10, color: "#444" }}>{settings.companyName || "[Your Company Name]"} is pleased to submit this proposal for the work described below. All work will be performed in accordance with applicable codes and industry standards.</p>
              <table className="group-table"><thead><tr><th>Code / Description</th><th style={{ width: 110, textAlign: "right" }}>Amount</th></tr></thead><tbody>
                {getGroups().map(g => (<React.Fragment key={g.code}>
                  <tr className="grp-hdr"><td>{g.code}</td><td></td></tr>
                  {g.items.map(l => <tr className="grp-line" key={l.id}><td>{l.description || "(no description)"}</td><td style={{ textAlign: "right" }}>{fmt(calcFinal(l))}</td></tr>)}
                  <tr className="grp-sub"><td style={{ textAlign: "right", paddingRight: 12 }}>Subtotal — {g.code}</td><td style={{ textAlign: "right" }}>{fmt(g.subtotal)}</td></tr>
                </React.Fragment>))}
                <tr className="total-row"><td style={{ textAlign: "right", paddingRight: 16 }}>TOTAL</td><td>{fmt(grandTotal)}</td></tr>
              </tbody></table>
              <div className="qual-section"><h4>Qualifications and Clarifications Apply</h4><ol>{qualifications.filter(q => q.text.trim()).map((q, i) => { const subs = q.subs || []; return <li key={i}>{q.text}{subs.length > 0 && <ol className="sub-list">{subs.filter(s => s.trim()).map((s, si) => <li key={si}>{s}</li>)}</ol>}</li>; })}</ol></div>
              <div className="qual-section" style={{ marginTop: 14 }}><h4 style={{ color: "#c0392b" }}>Excluded Items:</h4><ol>{exclusions.filter(q => q.text.trim()).map((q, i) => { const subs = q.subs || []; return <li key={i}>{q.text}{subs.length > 0 && <ol className="sub-list">{subs.filter(s => s.trim()).map((s, si) => <li key={si}>{s}</li>)}</ol>}</li>; })}</ol></div>
              <div className="company-block"><strong>{settings.companyName || "[Your Company Name]"}</strong><br/>{settings.companyAddress && <>{settings.companyAddress}<br/></>}{settings.companyPhone && <>PHONE - {settings.companyPhone}<br/></>}{settings.companyEmail && <>{settings.companyEmail}<br/></>}</div>
              {closingNote && <div className="closing">{closingNote}</div>}
              <div className="sig-block"><div><div className="sig-line">Client Signature</div><div className="sig-line" style={{ marginTop: 20 }}>Printed Name &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div></div><div><div className="sig-line">Contractor Signature</div><div className="sig-line" style={{ marginTop: 20 }}>Printed Name &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div></div></div>
            </div>
          </div>
        </div>
      )}
      </div>
    </div>
    )}
    {/* ── Floating chat widget ── */}
    {authResolved && (
      <>
        <button className="chat-fab" onClick={() => setChatOpen(o => !o)} title="AI Assistant">
          <span>{chatOpen ? "✕" : "🤖"}</span>
          <span>{chatOpen ? "Close" : "Ask AI"}</span>
        </button>
        {chatOpen && (
          <div className="chat-window">
            <div className="chat-header">
              <div>&#10024; AI Assistant</div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span>Construction estimating help</span>
                {chatMessages.length > 0 && <button onClick={() => setChatMessages([])} title="Clear chat" style={{ fontSize: 12 }}>Clear</button>}
                <button onClick={() => setChatOpen(false)}>✕</button>
              </div>
            </div>
            <div className="chat-messages">
              {chatMessages.length === 0 && (
                <div className="chat-empty">
                  Ask me anything — how to phrase an exclusion, what CSI code to use, how to structure a scope, pricing questions, or anything else about the estimate.
                </div>
              )}
              {chatMessages.map((m, i) => (
                <div key={i} className={`chat-msg ${m.role}`}>{m.content}</div>
              ))}
              {chatLoading && <div className="chat-msg assistant thinking">Thinking...</div>}
            </div>
            <div className="chat-input-row">
              <textarea
                className="chat-input"
                rows={1}
                placeholder="Ask anything..."
                value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleChatSend(); } }}
              />
              <button className="chat-send" onClick={handleChatSend} disabled={chatLoading || !chatInput.trim()}>Send</button>
            </div>
          </div>
        )}
      </>
    )}

    {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
