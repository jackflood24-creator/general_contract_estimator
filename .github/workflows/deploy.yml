name: Deploy to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install function dependencies
        run: npm install --prefix functions

      - name: Deploy to Firebase (hosting + functions)
        run: npx firebase-tools@latest deploy --token ${{ secrets.FIREBASE_TOKEN }} --project project-general-estimator --non-interactive
